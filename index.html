<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公益集</title>
    <link rel="icon" type="image/svg+xml" href="api.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            background: url('壁纸/普通/wallhaven-1j7z19.jpg') center/cover no-repeat fixed;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 100%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 搜索区域 - Infinity风格 */
        .search-section {
            text-align: center;
            margin-bottom: 60px;
            margin-top: 20px;
        }

        .time-display {
            color: white;
            font-size: 4.5rem;
            font-weight: 300;
            letter-spacing: -2px;
            margin-bottom: 8px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .date-display {
            color: rgba(255,255,255,0.85);
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .search-box {
            max-width: 680px;
            margin: 0 auto;
            position: relative;
        }

        .search-input-wrapper {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 6px;
            display: flex;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .search-input-wrapper:focus-within {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 16px 20px;
            font-size: 1.05rem;
            outline: none;
            color: #333;
        }

        .search-input::placeholder {
            color: #999;
        }

        .search-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
        }

        /* 链接网格 - Infinity风格大图标 */
        .links-section {
            flex: 1;
        }

        .section-title {
            color: rgba(255,255,255,0.9);
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            padding-left: 10px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }

        .type-section {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.06);
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
        }

        .type-section.drag-over {
            background: rgba(102, 126, 234, 0.16);
            border-color: rgba(102, 126, 234, 0.45);
        }

        .type-group-title {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            font-weight: 600;
            padding: 6px 4px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.16);
            cursor: grab;
            transition: transform 0.2s, opacity 0.2s;
        }

        .type-group-title:active {
            cursor: grabbing;
        }

        .type-group-title.dragging {
            opacity: 0.45;
            transform: scale(0.98);
        }

        .type-group-title .drag-hint {
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.45);
            margin-left: auto;
            font-weight: 400;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .type-section:hover .drag-hint {
            opacity: 1;
        }

        .type-group-title .type-count {
            background: rgba(255, 255, 255, 0.16);
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .type-management {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .type-management-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .type-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .type-tag {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 16px;
            padding: 4px 10px;
            font-size: 0.8rem;
            color: #333;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .type-tag-default {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.18), rgba(118, 75, 162, 0.16));
            border-color: rgba(102, 126, 234, 0.55);
            color: #4c51bf;
            font-weight: 600;
        }

        .type-tag-default::after {
            content: '默认';
            padding: 1px 6px;
            border-radius: 10px;
            background: rgba(102, 126, 234, 0.18);
            color: #667eea;
            font-size: 0.68rem;
            font-weight: 600;
        }

        .type-tag-delete {
            background: transparent;
            border: none;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            font-size: 10px;
            color: #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            line-height: 1;
            padding: 0;
        }

        .type-tag-delete:hover {
            background: rgba(255, 80, 80, 0.2);
            color: #d32f2f;
        }

        .type-add-form {
            display: flex;
            gap: 8px;
        }

        .type-input {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            background: white;
            color: #333;
            font-size: 0.85rem;
            font-family: monospace;
            letter-spacing: 0.5px;
            transition: border-color 0.2s, box-shadow 0.2s;
            min-width: 0;
        }

        .type-input::placeholder {
            color: #999;
        }

        .type-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .type-add-btn {
            padding: 10px 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .type-add-btn:hover {
            background: #5a67d8;
            transform: translateY(-1px);
        }

        /* 类型标签编辑按钮 */
        .type-tag-edit {
            background: transparent;
            border: none;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            font-size: 10px;
            color: #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            line-height: 1;
            padding: 0;
        }

        .type-tag-edit:hover {
            background: rgba(102, 126, 234, 0.25);
            color: #4c51bf;
        }

        /* 类型标签行内编辑输入框 */
        .type-tag-input {
            border: none;
            background: transparent;
            color: #333;
            font-size: 0.8rem;
            font-family: inherit;
            width: 72px;
            min-width: 0;
            padding: 0;
            outline: none;
            border-bottom: 1px solid #667eea;
        }

        /* 轻量 toast 提示 */
        .toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none;
        }

        .toast {
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.85rem;
            color: #fff;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.25s, transform 0.25s;
            max-width: 80vw;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast-info {
            background: rgba(51, 51, 51, 0.92);
        }

        .toast-success {
            background: linear-gradient(135deg, #43a047, #2e7d32);
        }

        .toast-error {
            background: linear-gradient(135deg, #e53935, #c62828);
        }

        /* 同步按钮禁用态 */
        .sync-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 20px 12px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            cursor: pointer;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
        }

        /* 禁用的链接卡片样式 - 更明显的灰度效果 */
        .link-card.disabled {
            background: rgba(40, 40, 45, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .link-card.disabled:hover {
            background: rgba(40, 40, 45, 0.65);
        }

        .link-card.disabled .link-icon-wrapper {
            opacity: 0.4;
            filter: grayscale(0.8);
            background: rgba(200, 200, 200, 0.9);
        }

        .link-card.disabled .link-title {
            color: rgba(255, 255, 255, 0.45);
        }

        /* 禁用状态的水印标识 */
        .link-card.disabled::after {
            content: '已禁用';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.6);
            color: rgba(255, 255, 255, 0.7);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 500;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .link-card.disabled:hover::after {
            opacity: 1;
        }

        /* 位置徽章（毛玻璃风格，仅启用组） */
        .position-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            min-width: 22px;
            height: 22px;
            padding: 0 6px;
            border-radius: 11px;
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
            pointer-events: none;
            z-index: 2;
            letter-spacing: -0.2px;
        }

        .position-badge.rank-high {
            background: rgba(245, 87, 108, 0.75);
        }

        .position-badge.rank-mid {
            background: rgba(255, 152, 0, 0.7);
        }

        .position-badge.rank-normal {
            background: rgba(102, 126, 234, 0.65);
        }

        /* 拖拽状态 */
        .link-card.dragging {
            opacity: 0.4;
        }

        .link-card.drag-over {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.6);
        }

        /* 分组间距 */
        #disabledTitle {
            margin-top: 24px;
        }

        .link-icon-wrapper {
            width: 56px;
            height: 56px;
            margin: 0 auto 12px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.3s;
        }

        .link-card:hover .link-icon-wrapper {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .link-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .link-icon.error {
            width: 28px;
            height: 28px;
            opacity: 0.5;
        }

        .link-title {
            color: white;
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        .delete-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(245, 87, 108, 0.9);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s;
            font-size: 14px;
            line-height: 1;
        }

        .link-card:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: #f5576c;
            transform: scale(1.1);
        }

        /* 右键上下文菜单 */
        .context-menu {
            position: fixed;
            background: white;
            border-radius: 12px;
            padding: 6px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            min-width: 140px;
            display: none;
            animation: menuFadeIn 0.15s ease;
        }

        @keyframes menuFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .context-menu.show {
            display: block;
        }

        .context-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #333;
            transition: background 0.2s;
            user-select: none;
        }

        .context-menu-item:hover {
            background: #f5f5f5;
        }

        .context-menu-item.danger:hover {
            background: #fff0f2;
            color: #f5576c;
        }

        .context-menu-divider {
            height: 1px;
            background: #f0f0f0;
            margin: 4px 0;
        }

        /* 编辑弹窗 / 删除确认弹窗 通用遮罩 */
        .edit-modal-overlay,
        .confirm-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .edit-modal-overlay.active,
        .confirm-modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        /* 删除确认弹窗特有样式 */
        .confirm-modal {
            background: white;
            border-radius: 24px;
            padding: 32px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            transform: scale(0.9);
            transition: transform 0.3s;
            text-align: center;
        }

        .confirm-modal-overlay.active .confirm-modal {
            transform: scale(1);
        }

        .confirm-icon {
            font-size: 2.8rem;
            margin-bottom: 12px;
        }

        .confirm-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .confirm-desc {
            font-size: 0.95rem;
            color: #888;
            margin-bottom: 24px;
        }

        .btn-danger {
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        /* 图标选择器 */
        .icon-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .icon-option {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px 8px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s;
            background: #fafafa;
            user-select: none;
        }

        .icon-option:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .icon-option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102,126,234,0.08), rgba(118,75,162,0.08));
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }

        .icon-option img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            border-radius: 8px;
        }

        .icon-option span {
            font-size: 0.78rem;
            color: #555;
            font-weight: 500;
            text-align: center;
        }

        .icon-option.selected span {
            color: #667eea;
        }

        /* 添加按钮 */
        .add-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            cursor: pointer;
        }

        .add-card:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .add-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 12px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.2);
            font-size: 28px;
            color: white;
            transition: all 0.3s;
        }

        .add-card:hover .add-icon {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        /* 添加链接弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: white;
            border-radius: 24px;
            padding: 32px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 16px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .modal-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .custom-select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 16px;
            transition: all 0.3s;
            font-family: inherit;
            background: white;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
            box-sizing: border-box;
        }

        .custom-select:hover {
            border-color: #ccc;
        }

        .custom-select.open {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .custom-select-value {
            color: #333;
            flex: 1;
        }

        .custom-select-value.placeholder {
            color: #999;
        }

        .custom-select-arrow {
            color: #999;
            font-size: 0.9rem;
            margin-left: 8px;
            transition: transform 0.2s;
        }

        .custom-select.open .custom-select-arrow {
            transform: rotate(180deg);
        }

        .custom-select-options {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 4px;
            background: white;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            z-index: 10;
            overflow: hidden;
            max-height: 200px;
            overflow-y: auto;
        }

        .custom-select.open .custom-select-options {
            display: block;
        }

<body>
    <div class="container">

            <div class="custom-select" id="editSiteTypeSelect" onclick="toggleCustomSelect(this)">

                <input type="password" class="token-input" id="githubToken" placeholder="粘贴 GitHub Token">

                    获取 Token：<a href="https://github.com/settings/tokens/new?scopes=gist&description=Infinity%20Start%20Sync" target="_blank">点击创建</a>（勾选 gist 权限）
                </div>

                </div>

                    <button class="sync-btn sync-btn-primary" id="uploadBtn" onclick="uploadToGist()">☁️ 上传</button>
                    <button class="sync-btn sync-btn-secondary" id="downloadBtn" onclick="downloadFromGist()">⬇️ 下载</button>

    <script>
        // 默认类型配置
        const DEFAULT_SITE_TYPE = 'API';
        const DEFAULT_TYPES = [DEFAULT_SITE_TYPE, '图片生成'];

        // 类型配置管理
        let siteTypes = JSON.parse(localStorage.getItem('siteTypes')) || [...DEFAULT_TYPES];

        const LEGACY_DEFAULT_TYPES = ['工具', '其他'];
        const SITE_TYPES_VERSION = '2';

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // 轻量非阻塞提示，替代打断式 alert。type: info | success | error
        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast toast-${type || 'info'}`;
            toast.textContent = message;
            container.appendChild(toast);
            // 触发进入动画
            requestAnimationFrame(() => toast.classList.add('show'));
            // 到时淡出并移除
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 2200);
        }

        // 自定义确认弹窗，返回 Promise<boolean>，替代打断式原生 confirm
        function showConfirm(options) {
            const opts = options || {};
            const overlay = document.getElementById('genericConfirmModal');
            document.getElementById('genericConfirmIcon').textContent = opts.icon || '⚠️';
            document.getElementById('genericConfirmTitle').textContent = opts.title || '确认操作';
            // desc 为写死的常量文案，用 innerHTML 以支持 <br> 换行，无用户输入故无 XSS 风险
            document.getElementById('genericConfirmDesc').innerHTML = opts.desc || '';
            const okBtn = document.getElementById('genericConfirmOk');
            const cancelBtn = document.getElementById('genericConfirmCancel');
            okBtn.textContent = opts.okText || '确定';
            cancelBtn.textContent = opts.cancelText || '取消';
            // 危险操作时确定按钮用红色样式
            okBtn.className = opts.danger ? 'btn btn-danger' : 'btn btn-primary';

            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);

            return new Promise(resolve => {
                const onKeydown = e => { if (e.key === 'Escape') close(false); };
                const close = result => {
                    overlay.classList.remove('active');
                    setTimeout(() => overlay.style.display = 'none', 300);
                    okBtn.onclick = null;
                    cancelBtn.onclick = null;
                    overlay.onclick = null;
                    document.removeEventListener('keydown', onKeydown);
                    resolve(result);
                };
                okBtn.onclick = () => close(true);
                cancelBtn.onclick = () => close(false);
                // 点击遮罩视为取消
                overlay.onclick = e => { if (e.target === overlay) close(false); };
                // Esc 视为取消
                document.addEventListener('keydown', onKeydown);
            });
        }

        // 过滤危险协议，只允许 http/https，阻断 javascript:/data: 等可执行脚本的协议
        function sanitizeUrl(value) {
            const url = String(value).trim();
            if (/^https?:\/\//i.test(url)) {
                return url;
            }
            return '#';
        }

        function normalizeSiteTypes(types, removeLegacyTypes) {
            const normalized = [];
            const source = Array.isArray(types) && types.length > 0 ? types : DEFAULT_TYPES;
            source.forEach(type => {
                if (type && !normalized.includes(type) && (!removeLegacyTypes || !LEGACY_DEFAULT_TYPES.includes(type))) {
                    normalized.push(type);
                }
            });
            DEFAULT_TYPES.forEach(type => {
                if (!normalized.includes(type)) {
                    normalized.push(type);
                }
            });
            return normalized;
        }

        function loadSiteTypes() {
            const saved = localStorage.getItem('siteTypes');
            const typesVersion = localStorage.getItem('siteTypesVersion');
            const removeLegacyTypes = typesVersion !== SITE_TYPES_VERSION;
            if (saved) {
                try {
                    siteTypes = normalizeSiteTypes(JSON.parse(saved), removeLegacyTypes);
                } catch (e) {
                    siteTypes = [...DEFAULT_TYPES];
                }
            } else {
                siteTypes = [...DEFAULT_TYPES];
            }
            localStorage.setItem('siteTypesVersion', SITE_TYPES_VERSION);
            saveSiteTypes();
            return siteTypes;
        }

        function saveSiteTypes() {
            localStorage.setItem('siteTypes', JSON.stringify(siteTypes));
        }

        // 数据迁移：给旧数据补 order 和 type 字段
        function migrateLinks(arr) {
            const validTypes = normalizeSiteTypes(siteTypes, false);
            return arr.map((link, idx) => ({
                ...link,
                order: typeof link.order === 'number' ? link.order : idx,
                type: validTypes.includes(link.type) ? link.type : DEFAULT_SITE_TYPE
            }));
        }

        // 存储链接的数组
        loadSiteTypes();
        let links = migrateLinks(JSON.parse(localStorage.getItem('myLinks')) || []);
        saveLinks();

        // 搜索关键词
        let searchKeyword = '';

        // 填充自定义下拉框
        function populateCustomSelect(selectId, hiddenId, currentValue) {
            const container = document.getElementById(selectId);
            const hidden = document.getElementById(hiddenId);
            const optionsDiv = container.querySelector('.custom-select-options');
            const valueSpan = container.querySelector('.custom-select-value');

            // 构建选项
            let optionsHtml = siteTypes.map(type => {
                const escapedType = escapeHtml(type);
                return `<div class="custom-select-option ${type === currentValue ? 'selected' : ''}" data-value="${escapedType}" onclick="selectCustomOption(event, this, '${hiddenId}')">${escapedType}</div>`;
            }).join('');
            // 旧数据兼容
            if (currentValue && !siteTypes.includes(currentValue)) {
                const escapedValue = escapeHtml(currentValue);
                optionsHtml += `<div class="custom-select-option selected" data-value="${escapedValue}" onclick="selectCustomOption(event, this, '${hiddenId}')">${escapedValue}</div>`;
            }
            optionsDiv.innerHTML = optionsHtml;

            hidden.value = currentValue || '';
            if (currentValue) {
                valueSpan.textContent = currentValue;
                valueSpan.classList.remove('placeholder');

        // 进入行内编辑：把类型名替换为输入框
        function startEditType(event, index) {
            event.stopPropagation();
            const oldName = siteTypes[index];
            if (!oldName || oldName === DEFAULT_SITE_TYPE) return;

            const tag = document.querySelector(`.type-tag[data-index="${index}"]`);
            if (!tag) return;
            const nameSpan = tag.querySelector('.type-tag-name');
            if (!nameSpan) return;

            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'type-tag-input';
            input.value = oldName;
            nameSpan.replaceWith(input);
            input.focus();
            input.select();

            let finished = false;
            const commit = () => {
                if (finished) return;
                finished = true;
                renameType(index, input.value);
            };
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); commit(); }
                else if (e.key === 'Escape') { finished = true; renderTypeList(); }
            });
            input.addEventListener('blur', commit);
        }

        // 重命名类型：同步更新所有引用该类型的网站
        function renameType(index, rawName) {
            const oldName = siteTypes[index];
            const newName = String(rawName).trim();

            if (!oldName || oldName === DEFAULT_SITE_TYPE) { renderTypeList(); return; }
            if (!newName || newName === oldName) { renderTypeList(); return; }
            if (siteTypes.includes(newName)) {
                showToast('该类型已存在！', 'error');
                renderTypeList();
                return;
            }

            siteTypes[index] = newName;
            links.forEach(link => {
                if (link.type === oldName) {
                    link.type = newName;
                }
            });
            saveSiteTypes();
            saveLinks();
            renderTypeList();
            renderLinks();
            showToast(`已重命名为"${newName}"`, 'success');
        }

        // 删除类型
        async function removeType(typeName) {
            if (typeName === DEFAULT_SITE_TYPE) {
                showToast('默认 API 类型不能删除！', 'error');
                return;
            }

            if (siteTypes.length <= 1) {
                showToast('至少保留一个类型！', 'error');
                return;
            }

            // 统计受影响的网站数量，让用户知情后再决定（类型名为用户输入，转义后再渲染）
            const affectedCount = links.filter(link => link.type === typeName).length;
            const safeTypeName = escapeHtml(typeName);
            const affectedTip = affectedCount > 0
                ? `<br>该类型下的 ${affectedCount} 个网站将移动到"${escapeHtml(DEFAULT_SITE_TYPE)}"类型。`
                : '';
            const confirmed = await showConfirm({
                icon: '🗑️',
                title: '删除类型',
                desc: `确定要删除类型"${safeTypeName}"吗？${affectedTip}`,
                okText: '删除',
                danger: true
            });
            if (!confirmed) return;

            // 删除类型后，已使用该类型的网站固定回退到默认 API 类型
            links.forEach(link => {
                if (link.type === typeName) {
                    link.type = DEFAULT_SITE_TYPE;
                }
            });
            saveLinks();

            siteTypes = siteTypes.filter(t => t !== typeName);
            saveSiteTypes();
            renderTypeList();
            renderLinks();
            showToast(`已删除类型"${typeName}"`, 'success');
        }

        // 添加链接
        async function addLink() {
            const urlInput = document.getElementById('siteUrl');
            const nameInput = document.getElementById('siteName');
            const typeSelect = document.getElementById('siteType');

            let url = urlInput.value.trim();
            const customName = nameInput.value.trim();
            const type = typeSelect.value;

            if (!url) {
                showToast('请输入网址！', 'error');
                return;
            }

            // 自动添加协议
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            // 验证URL
            try {
                new URL(url);
            } catch {
                showToast('请输入有效的网址！', 'error');
                return;
            }

            // 提取域名
            const domain = new URL(url).hostname;

            // 使用名称或域名作为显示名称
            const name = customName || domain.replace('www.', '');

            // 统一使用默认图标
            const favicon = 'api.svg';
            // 计算启用组最大 order，新增放到末尾
            const enabledOrders = links.filter(l => l.enabled !== false).map(l => l.order ?? 0);
            const maxOrder = enabledOrders.length > 0 ? Math.max(...enabledOrders) : -1;
            const link = {
                id: Date.now(),
                url: url,
                name: name,
                domain: domain,
                favicon: favicon,
                enabled: true,
                type: type,
                order: maxOrder + 1,
                addedAt: new Date().toISOString()
            };

            links.push(link);
            saveLinks();
            renderLinks();
            closeModal();
        }

        // 根据位置返回徽章 CSS class
        function getBadgeClass(position) {
            if (position <= 3) return 'rank-high';
            if (position <= 10) return 'rank-mid';
            return 'rank-normal';
        }

        // 渲染单个卡片（启用/禁用通用）
        function renderCard(link, position) {
            const iconFallback = "this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E🔗%3C/text%3E%3C/svg%3E'; this.classList.add('error');";
            const safeName = escapeHtml(link.name);
            const safeUrl = escapeHtml(sanitizeUrl(link.url));
            const safeFavicon = escapeHtml(link.favicon);

            if (link.enabled === false) {
                return `
                    <div class="link-card disabled" data-id="${link.id}" draggable="true"
                         title="${safeName} (已禁用)"
                         onclick="event.preventDefault(); showContextMenu(event, ${link.id});">
                        <button class="delete-btn" onclick="deleteLink(event, ${link.id})" title="删除">×</button>
                        <div class="link-icon-wrapper">
                            <img src="${safeFavicon}" alt="${safeName}" class="link-icon"
                                 onerror="${iconFallback}">
                        </div>
                        <div class="link-title">${safeName}</div>
                    </div>
                `;
            }

            const badgeHtml = position !== null
                ? `<div class="position-badge ${getBadgeClass(position)}">${position}</div>`
                : '';
            return `
                <a href="${safeUrl}" target="_blank" rel="noopener noreferrer" class="link-card" data-id="${link.id}" draggable="true"
                   title="${safeName}"
                   oncontextmenu="showContextMenu(event, ${link.id})">
                    ${badgeHtml}
                    <button class="delete-btn" onclick="deleteLink(event, ${link.id})" title="删除">×</button>
                    <div class="link-icon-wrapper">
                        <img src="${safeFavicon}" alt="${safeName}" class="link-icon"
                             onerror="${iconFallback}">
                    </div>
                    <div class="link-title">${safeName}</div>
                </a>
            `;
        }

        // 渲染链接列表
        function renderLinks() {
            const enabledGrid = document.getElementById('enabledGrid');
            const disabledGrid = document.getElementById('disabledGrid');
            const disabledTitle = document.getElementById('disabledTitle');

            // 过滤（搜索）
            let filtered = links;
            if (searchKeyword) {
                filtered = links.filter(link =>
                    link.name.toLowerCase().includes(searchKeyword) ||
                    link.domain.toLowerCase().includes(searchKeyword)
                );
            }

            // 分组 + 排序
            const byOrder = (a, b) => (a.order ?? 0) - (b.order ?? 0);
            const enabledLinks = filtered.filter(l => l.enabled !== false).sort(byOrder);
            const disabledLinks = filtered.filter(l => l.enabled === false).sort(byOrder);

            // 添加按钮（非搜索状态下显示）
            const addCardHtml = !searchKeyword ? `
                <div class="link-card add-card" onclick="openModal()" title="添加网站">
                    <div class="add-icon">+</div>
                    <div class="link-title">添加</div>
                </div>
            ` : '';

            // 全部为空 + 非搜索 → 第一格为添加卡片，下方一行提示
            if (links.length === 0 && !searchKeyword) {
                enabledGrid.innerHTML = `
                    <div class="link-card add-card" onclick="openModal()" title="添加网站">
                        <div class="add-icon">+</div>
                        <div class="link-title">添加</div>
                    </div>
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">📭</div>
                        <h3>还没有添加任何网站</h3>
                        <p>点击上方"添加"开始收藏</p>
                    </div>
                `;
                disabledTitle.style.display = 'none';
                disabledGrid.innerHTML = '';
                return;
            }

            // 搜索无结果
            if (searchKeyword && enabledLinks.length === 0 && disabledLinks.length === 0) {
                enabledGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">🔍</div>
                        <h3>未找到匹配的网站</h3>
                        <p>尝试其他关键词</p>
                    </div>
                `;
                disabledTitle.style.display = 'none';
                disabledGrid.innerHTML = '';
                return;
            }

            // 按类型分组启用的网站
            const typeGroups = {};
            enabledLinks.forEach(link => {
                const type = link.type || DEFAULT_SITE_TYPE;
                if (!typeGroups[type]) {
                    typeGroups[type] = [];
                }
                typeGroups[type].push(link);
            });

            // 渲染启用组（按类型分组）
            let enabledHtml = '';

            // 保持类型的配置顺序
            const orderedTypes = siteTypes.filter(type => typeGroups[type]);
            // 添加配置外的类型（如果有的话）
            Object.keys(typeGroups).forEach(type => {
                if (!orderedTypes.includes(type)) {
                    orderedTypes.push(type);
                }
            });

            let addCardAdded = false;
            orderedTypes.forEach((type, typeIndex) => {
                const linksInType = typeGroups[type];
                if (linksInType && linksInType.length > 0) {
                    let typePosition = 1;
                    let cardsHtml = linksInType.map(link => renderCard(link, typePosition++)).join('');

                    // 第一个分类末尾添加添加按钮
                    if (typeIndex === 0 && !searchKeyword) {
                        cardsHtml += addCardHtml;
                        addCardAdded = true;
                    }

                    const escapedType = escapeHtml(type);
                    enabledHtml += `
                        <div class="type-section" data-type="${escapedType}">
                            <div class="type-group-title" draggable="true" data-type="${escapedType}">
                                <span>⋮⋮</span>
                                <span>${escapedType}</span>
                                <span class="type-count">${linksInType.length}</span>
                                <span class="drag-hint">拖动分组排序</span>
                            </div>
                            ${cardsHtml}
                        </div>
                    `;
                }
            });

            // 如果没有分类显示但有添加按钮
            if (!addCardAdded && !searchKeyword) {
                enabledHtml += addCardHtml;
            }

            enabledGrid.innerHTML = enabledHtml;

            // 渲染禁用组
            if (disabledLinks.length > 0) {
                disabledTitle.style.display = '';
                disabledTitle.textContent = `已禁用 (${disabledLinks.length})`;
                disabledGrid.innerHTML = disabledLinks.map(link => renderCard(link, null)).join('');
            } else {
                disabledTitle.style.display = 'none';
                disabledGrid.innerHTML = '';
            }

            // 附加拖拽处理器
            attachDragHandlers();
            attachTypeGroupDragHandlers();
        }

        // ===== 类型分组拖拽排序 =====
        let draggedGroupType = null;

        function attachTypeGroupDragHandlers() {
            document.querySelectorAll('.type-group-title[draggable="true"]').forEach(title => {
                title.addEventListener('dragstart', handleGroupDragStart);
                title.addEventListener('dragend', handleGroupDragEnd);
            });
            document.querySelectorAll('.type-section').forEach(section => {
                section.addEventListener('dragover', handleGroupDragOver);
                section.addEventListener('dragleave', handleGroupDragLeave);
                section.addEventListener('drop', handleGroupDrop);
            });
        }

        function handleGroupDragStart(e) {
            draggedGroupType = this.dataset.type;
            this.classList.add('dragging');
            e.stopPropagation();
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/site-type', draggedGroupType);
        }

        function handleGroupDragOver(e) {
            if (!draggedGroupType) return;
            const targetType = e.currentTarget.dataset.type;
            if (!targetType || targetType === draggedGroupType) return;
            e.preventDefault();
            e.stopPropagation();
            e.dataTransfer.dropEffect = 'move';
            e.currentTarget.classList.add('drag-over');
        }

        function handleGroupDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function handleGroupDrop(e) {
            e.preventDefault();
            e.stopPropagation();
            e.currentTarget.classList.remove('drag-over');
            if (!draggedGroupType) return;
            const targetType = e.currentTarget.dataset.type;
            if (!targetType || targetType === draggedGroupType) return;

            const visibleTypes = Array.from(document.querySelectorAll('.type-section'))
                .map(section => section.dataset.type)
                .filter(Boolean);
            const ordered = siteTypes.filter(type => !visibleTypes.includes(type));
            const fromIdx = visibleTypes.indexOf(draggedGroupType);
            const targetIdx = visibleTypes.indexOf(targetType);
            if (fromIdx === -1 || targetIdx === -1) return;

            const reorderedVisibleTypes = visibleTypes.filter(type => type !== draggedGroupType);
            const adjustedTargetIdx = reorderedVisibleTypes.indexOf(targetType);
            if (adjustedTargetIdx === -1) return;

            const insertIdx = fromIdx < targetIdx ? adjustedTargetIdx + 1 : adjustedTargetIdx;
            reorderedVisibleTypes.splice(insertIdx, 0, draggedGroupType);
            siteTypes = normalizeSiteTypes([...reorderedVisibleTypes, ...ordered], false);

            saveSiteTypes();
            renderLinks();
            renderTypeList();
        }

        function handleGroupDragEnd(e) {
            document.querySelectorAll('.type-group-title').forEach(t => t.classList.remove('dragging'));
            document.querySelectorAll('.type-section').forEach(t => t.classList.remove('drag-over'));
            draggedGroupType = null;
        }

        // ===== 拖拽排序 =====
        let draggedId = null;

        function attachDragHandlers() {
            document.querySelectorAll('.link-card[draggable="true"]').forEach(card => {
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragover', handleDragOver);
                card.addEventListener('dragleave', handleDragLeave);
                card.addEventListener('drop', handleDrop);
                card.addEventListener('dragend', handleDragEnd);
            });
        }

        function handleDragStart(e) {
            draggedId = parseInt(this.dataset.id);
            this.classList.add('dragging');
            e.stopPropagation();
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', String(draggedId));
        }

        function handleDragOver(e) {
            if (draggedId === null) return;
            const targetId = parseInt(this.dataset.id);
            if (targetId === draggedId) return;

            const dragged = links.find(l => l.id === draggedId);
            const target = links.find(l => l.id === targetId);
            if (!dragged || !target) return;
            // 跨启用/禁用组或跨类型忽略
            if ((dragged.enabled !== false) !== (target.enabled !== false)) return;
            if (dragged.enabled !== false && (dragged.type || DEFAULT_SITE_TYPE) !== (target.type || DEFAULT_SITE_TYPE)) return;

            e.preventDefault();
            this.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            this.classList.remove('drag-over');
        }

        function handleDrop(e) {
            if (draggedId === null) return;
            e.preventDefault();
            e.stopPropagation();
            this.classList.remove('drag-over');

            const targetId = parseInt(this.dataset.id);
            if (targetId === draggedId) return;

            const dragged = links.find(l => l.id === draggedId);
            const target = links.find(l => l.id === targetId);
            if (!dragged || !target) return;
            if ((dragged.enabled !== false) !== (target.enabled !== false)) return;
            if (dragged.enabled !== false && (dragged.type || DEFAULT_SITE_TYPE) !== (target.type || DEFAULT_SITE_TYPE)) return;

            // 同组内重排 + 紧凑化 order
            const isEnabled = dragged.enabled !== false;
            const group = links.filter(l => {
                const sameEnabledState = (l.enabled !== false) === isEnabled;
                if (!sameEnabledState) return false;
                if (!isEnabled) return true;
                return (l.type || DEFAULT_SITE_TYPE) === (dragged.type || DEFAULT_SITE_TYPE);
            }).sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
            const fromIdx = group.findIndex(l => l.id === draggedId);
            const toIdx = group.findIndex(l => l.id === targetId);
            if (fromIdx === -1 || toIdx === -1) return;

            const [removed] = group.splice(fromIdx, 1);
            group.splice(toIdx, 0, removed);

            group.forEach((l, idx) => {
                const item = links.find(link => link.id === l.id);
                if (item) item.order = idx;
            });

            saveLinks();
            renderLinks();
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
            draggedId = null;
        }

        // 删除链接（卡片上的 × 按钮）
        function deleteLink(event, id) {
            event.preventDefault();
            event.stopPropagation();
            editingId = id;
            const overlay = document.getElementById('confirmModal');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
        }

        // 保存链接到localStorage
        function saveLinks() {
            localStorage.setItem('myLinks', JSON.stringify(links));
        }

        // ===== 右键菜单功能 =====
        let contextTargetId = null;

        // 显示右键菜单
        function showContextMenu(event, id) {
            event.preventDefault();
            event.stopPropagation();
            contextTargetId = id;

            const menu = document.getElementById('contextMenu');
            menu.classList.add('show');

            // 防止菜单超出屏幕
            const menuW = 150, menuH = 90;
            let x = event.clientX, y = event.clientY;
            if (x + menuW > window.innerWidth) x = window.innerWidth - menuW - 8;
            if (y + menuH > window.innerHeight) y = window.innerHeight - menuH - 8;

            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
        }

        // 隐藏右键菜单
        function hideContextMenu() {
            document.getElementById('contextMenu').classList.remove('show');
            contextTargetId = null;
        }

        // 点击其他区域关闭菜单
        document.addEventListener('click', hideContextMenu);
        document.addEventListener('contextmenu', (e) => {
            if (!e.target.closest('.link-card') || e.target.closest('.add-card')) {
                hideContextMenu();
            }
        });

        // 从右键菜单删除 - 改为弹出自定义确认框
        function deleteLinkFromMenu() {
            if (contextTargetId === null) return;
            editingId = contextTargetId;
            document.getElementById('contextMenu').classList.remove('show');
            contextTargetId = null;
            // 打开自定义删除确认弹窗
            const overlay = document.getElementById('confirmModal');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
        }

        // 关闭删除确认弹窗
        function closeConfirmModal() {
            const overlay = document.getElementById('confirmModal');
            overlay.classList.remove('active');
            setTimeout(() => overlay.style.display = 'none', 300);
            editingId = null;
        }

        // 确认删除
        function confirmDelete() {
            if (editingId === null) return;
            links = links.filter(link => link.id !== editingId);
            saveLinks();
            renderLinks();
            closeConfirmModal();
        }

        // 正在编辑的链接 id（独立于右键菜单，不会被 hideContextMenu 清除）
        let editingId = null;

        // 打开编辑弹窗
        function openEditModal() {
            if (contextTargetId === null) return;
            editingId = contextTargetId;
            const link = links.find(l => l.id === editingId);
            if (!link) return;

            document.getElementById('editSiteUrl').value = link.url;
            document.getElementById('editSiteName').value = link.name;
            populateCustomSelect('editSiteTypeSelect', 'editSiteType', link.type || DEFAULT_SITE_TYPE);
            // 设置启用状态（默认为 true，兼容旧数据）
            document.getElementById('editSiteEnabled').checked = link.enabled !== false;

            // 先关菜单，再开弹窗
            document.getElementById('contextMenu').classList.remove('show');
            contextTargetId = null;

            const overlay = document.getElementById('editModal');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
            document.getElementById('editSiteName').focus();
        }

        // 关闭编辑弹窗
        function closeEditModal() {
            const overlay = document.getElementById('editModal');
            overlay.classList.remove('active');
            setTimeout(() => overlay.style.display = 'none', 300);
            document.getElementById('editSiteTypeSelect').classList.remove('open');
            editingId = null;
        }

        // 保存编辑
        async function saveEdit() {
            if (editingId === null) return;
            const idx = links.findIndex(l => l.id === editingId);
            if (idx === -1) return;

            let url = document.getElementById('editSiteUrl').value.trim();
            const name = document.getElementById('editSiteName').value.trim();
            const enabled = document.getElementById('editSiteEnabled').checked;
            const type = document.getElementById('editSiteType').value;

            if (!url) { showToast('请输入网址！', 'error'); return; }
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            try { new URL(url); } catch { showToast('请输入有效的网址！', 'error'); return; }

            const domain = new URL(url).hostname;

            const wasEnabled = links[idx].enabled !== false;

            links[idx].url = url;
            links[idx].name = name || domain.replace('www.', '');
            links[idx].domain = domain;
            links[idx].favicon = 'api.svg'; // 统一使用默认图标
            links[idx].enabled = enabled;
            links[idx].type = type;

            // 启用状态切换时，把它放到目标组末尾
            if (wasEnabled !== enabled) {
                const targetOrders = links
                    .filter((l, i) => i !== idx && (l.enabled !== false) === enabled)
                    .map(l => l.order ?? 0);
                const maxOrder = targetOrders.length > 0 ? Math.max(...targetOrders) : -1;
                links[idx].order = maxOrder + 1;
            }

            saveLinks();
            renderLinks();
            closeEditModal();
        }

        // 编辑弹窗回车保存
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('editSiteUrl')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') saveEdit();
            });
            document.getElementById('editSiteName')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') saveEdit();
            });
            // 编辑弹窗和删除确认弹窗均不响应点击遮罩关闭（防止选文字时误触）
        });

        // 更换背景
        function changeBg(bg) {
            currentWallpaper = bg;
            localStorage.setItem('currentWallpaper', bg);
            applyBackground(bg);
        }

        // ===== GitHub Gist 同步功能 =====
        const GIST_FILENAME = 'infinity-start-data.json';
        // Token 创建地址（已预选 gist 权限），失效或未填时引导用户跳转
        const TOKEN_CREATE_URL = 'https://github.com/settings/tokens/new?scopes=gist&description=Infinity%20Start%20Sync';

        // 标记鉴权类错误（401/403），便于 catch 时区分处理
        function authError(message) {
            const error = new Error(message);
            error.isAuthError = true;
            return error;
        }

        // 在状态栏渲染带跳转链接的 Token 失效提示（链接为固定常量，无 XSS 风险）
        function showTokenError(statusEl) {
            statusEl.className = 'sync-status error';
            statusEl.innerHTML = `Token 无效或已过期，请重新获取后连接：<a href="${TOKEN_CREATE_URL}" target="_blank" rel="noopener noreferrer">点击创建新 Token</a>（勾选 gist 权限）`;
        }

        // 页面加载时检查同步状态
        function initSyncStatus() {
            const token = localStorage.getItem('githubToken');
            const gistId = localStorage.getItem('gistId');
            if (token && gistId) {
                showSyncConnected();
            }
        }

        // 连接 GitHub
        async function connectGitHub() {
            const token = document.getElementById('githubToken').value.trim();
            const statusEl = document.getElementById('syncStatus');
            if (!token) {
                showTokenError(statusEl);
                return;
            }

            statusEl.textContent = '正在连接...';
            statusEl.className = 'sync-status';

            try {
                // 验证 Token 并查找或创建 Gist
                const gistId = await findOrCreateGist(token);
                localStorage.setItem('githubToken', token);
                localStorage.setItem('gistId', gistId);
                showSyncConnected();
                statusEl.textContent = '已连接 - 可以上传/下载数据';
                statusEl.className = 'sync-status connected';
            } catch (error) {
                // 鉴权失败展示跳转链接，其他错误显示普通文案
                if (error.isAuthError) {
                    showTokenError(statusEl);
                } else {
                    statusEl.textContent = '连接失败: ' + error.message;
                    statusEl.className = 'sync-status error';
                }
            }
        }

        // 查找或创建 Gist
        async function findOrCreateGist(token) {
            // 先查找是否已有 Gist
            const response = await fetch('https://api.github.com/gists', {
                headers: { 'Authorization': 'token ' + token }
            });
            if (response.status === 401 || response.status === 403) {
                throw authError('Token 无效或已过期');
            }
            if (!response.ok) throw new Error('请求失败');

            const gists = await response.json();
            const existingGist = gists.find(g => g.files && g.files[GIST_FILENAME]);

            if (existingGist) {
                return existingGist.id;
            }

            // 创建新 Gist
            const createResponse = await fetch('https://api.github.com/gists', {
                method: 'POST',
                headers: {
                    'Authorization': 'token ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    description: 'Infinity Start 数据同步',
                    public: false,
                    files: {
                        [GIST_FILENAME]: {
                            content: JSON.stringify({ links: [], wallpaper: '' })
                        }
                    }
                })
            });

            if (!createResponse.ok) throw new Error('创建 Gist 失败');
            const newGist = await createResponse.json();
            return newGist.id;
        }

        // 显示已连接状态
        function showSyncConnected() {
            document.getElementById('syncLoginForm').style.display = 'none';
            document.getElementById('syncActions').style.display = 'block';
            const lastSync = localStorage.getItem('lastSync');
            if (lastSync) {
                document.getElementById('lastSync').textContent = '上次同步: ' + new Date(lastSync).toLocaleString();
            }
        }

        // 上传到 Gist
        async function uploadToGist() {
            const token = localStorage.getItem('githubToken');
            const gistId = localStorage.getItem('gistId');
            if (!token || !gistId) return;

            const statusEl = document.getElementById('syncStatus');
            const uploadBtn = document.getElementById('uploadBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            // 操作期间禁用按钮，避免重复请求
            uploadBtn.disabled = true;
            downloadBtn.disabled = true;
            statusEl.textContent = '正在上传...';

            try {
                const data = {
                    links: links,
                    wallpaper: localStorage.getItem('currentWallpaper') || '',
                    siteTypes: siteTypes
                };

                const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': 'token ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: {
                            [GIST_FILENAME]: {
                                content: JSON.stringify(data, null, 2)
                            }
                        }
                    })
                });

                if (response.status === 401 || response.status === 403) {
                    throw authError('Token 无效或已过期');
                }
                if (!response.ok) throw new Error('上传失败');

                const now = new Date().toISOString();
                localStorage.setItem('lastSync', now);
                document.getElementById('lastSync').textContent = '上次同步: ' + new Date(now).toLocaleString();
                statusEl.textContent = '已连接 - 上传成功';
                statusEl.className = 'sync-status connected';
                showToast('已上传到云端', 'success');
            } catch (error) {
                if (error.isAuthError) {
                    showTokenError(statusEl);
                } else {
                    statusEl.textContent = '上传失败: ' + error.message;
                    statusEl.className = 'sync-status error';
                }
                showToast('上传失败：' + error.message, 'error');
            } finally {
                uploadBtn.disabled = false;
                downloadBtn.disabled = false;
            }
        }

        // 从 Gist 下载
        async function downloadFromGist() {
            const token = localStorage.getItem('githubToken');
            const gistId = localStorage.getItem('gistId');
            if (!token || !gistId) return;

            const statusEl = document.getElementById('syncStatus');
            const uploadBtn = document.getElementById('uploadBtn');
            const downloadBtn = document.getElementById('downloadBtn');

            // 本地有任何数据（链接或自定义类型）就提示，避免静默覆盖
            const hasLocalData = links.length > 0 || siteTypes.some(t => !DEFAULT_TYPES.includes(t));
            if (hasLocalData) {
                const confirmed = await showConfirm({
                    icon: '⬇️',
                    title: '覆盖本地数据',
                    desc: '下载将用云端数据覆盖当前本地的网站和类型，<br>确定继续？',
                    okText: '覆盖',
                    danger: true
                });
                if (!confirmed) return;
            }

            // 操作期间禁用按钮，避免重复请求
            uploadBtn.disabled = true;
            downloadBtn.disabled = true;
            statusEl.textContent = '正在下载...';

            try {
                const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                    headers: { 'Authorization': 'token ' + token }
                });

                if (response.status === 401 || response.status === 403) {
                    throw authError('Token 无效或已过期');
                }
                if (!response.ok) throw new Error('下载失败');

                const gist = await response.json();
                const file = gist.files[GIST_FILENAME];
                if (!file) throw new Error('数据文件不存在');

                const data = JSON.parse(file.content);

                // 恢复数据
                if (data.siteTypes && Array.isArray(data.siteTypes) && data.siteTypes.length > 0) {
                    // 覆盖类型：完全以云端数据为准，不保留本地独有类型
                    siteTypes = normalizeSiteTypes(data.siteTypes, false);
                    saveSiteTypes();
                    renderTypeList();
                }
                if (data.links) {
                    links = migrateLinks(data.links);
                    saveLinks();
                    renderLinks();
                }
                if (data.wallpaper) {
                    localStorage.setItem('currentWallpaper', data.wallpaper);
                    applyBackground(data.wallpaper);
                }

                const now = new Date().toISOString();
                localStorage.setItem('lastSync', now);
                document.getElementById('lastSync').textContent = '上次同步: ' + new Date(now).toLocaleString();
                statusEl.textContent = '已连接 - 下载成功';
                statusEl.className = 'sync-status connected';
                showToast('已用云端数据覆盖本地', 'success');
            } catch (error) {
                if (error.isAuthError) {
                    showTokenError(statusEl);
                } else {
                    statusEl.textContent = '下载失败: ' + error.message;
                    statusEl.className = 'sync-status error';
                }
                showToast('下载失败：' + error.message, 'error');
            } finally {
                uploadBtn.disabled = false;
                downloadBtn.disabled = false;
            }
        }

        // 应用背景
        function applyBackground(bg) {
            const body = document.body;
            
            if (bg.startsWith('gradient')) {
                body.style.backgroundImage = 'none';
                switch(bg) {
                    case 'gradient1':
                        body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                        break;
                    case 'gradient2':
                        body.style.background = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
                        break;
                }
            } else {
                // 过滤能逃逸出 url('...') 的字符（引号、括号、反斜杠、空白），阻断 CSS 注入
                const safeBg = String(bg).replace(/['"()\\\s]/g, '');
                body.style.background = `url('${safeBg}') center/cover no-repeat fixed`;
            }
        }
    </script>
</body>
