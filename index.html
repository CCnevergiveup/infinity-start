<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公益集</title>
    <link rel="icon" type="image/svg+xml" href="api.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            background: url('壁纸/普通/wallhaven-1j7z19.jpg') center/cover no-repeat fixed;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 100%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 搜索区域 - Infinity风格 */
        .search-section {
            text-align: center;
            margin-bottom: 60px;
            margin-top: 20px;
        }

        .time-display {
            color: white;
            font-size: 4.5rem;
            font-weight: 300;
            letter-spacing: -2px;
            margin-bottom: 8px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .date-display {
            color: rgba(255,255,255,0.85);
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .search-box {
            max-width: 680px;
            margin: 0 auto;
            position: relative;
        }

        .search-input-wrapper {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 6px;
            display: flex;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .search-input-wrapper:focus-within {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 16px 20px;
            font-size: 1.05rem;
            outline: none;
            color: #333;
        }

        .search-input::placeholder {
            color: #999;
        }

        .search-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
        }

        /* 链接网格 - Infinity风格大图标 */
        .links-section {
            flex: 1;
        }

        .section-title {
            color: rgba(255,255,255,0.9);
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            padding-left: 10px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 20px 12px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            cursor: pointer;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
        }

        /* 禁用的链接卡片样式 - 更明显的灰度效果 */
        .link-card.disabled {
            background: rgba(40, 40, 45, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .link-card.disabled:hover {
            background: rgba(40, 40, 45, 0.65);
        }

        .link-card.disabled .link-icon-wrapper {
            opacity: 0.4;
            filter: grayscale(0.8);
            background: rgba(200, 200, 200, 0.9);
        }

        .link-card.disabled .link-title {
            color: rgba(255, 255, 255, 0.45);
        }

        /* 禁用状态的水印标识 */
        .link-card.disabled::after {
            content: '已禁用';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.6);
            color: rgba(255, 255, 255, 0.7);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 500;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .link-card.disabled:hover::after {
            opacity: 1;
        }

        /* 位置徽章（毛玻璃风格，仅启用组） */
        .position-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            min-width: 22px;
            height: 22px;
            padding: 0 6px;
            border-radius: 11px;
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
            pointer-events: none;
            z-index: 2;
            letter-spacing: -0.2px;
        }

        .position-badge.rank-high {
            background: rgba(245, 87, 108, 0.75);
        }

        .position-badge.rank-mid {
            background: rgba(255, 152, 0, 0.7);
        }

        .position-badge.rank-normal {
            background: rgba(102, 126, 234, 0.65);
        }

        /* 拖拽状态 */
        .link-card.dragging {
            opacity: 0.4;
        }

        .link-card.drag-over {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.6);
        }

        /* 分组间距 */
        #disabledTitle {
            margin-top: 24px;
        }

        .link-icon-wrapper {
            width: 56px;
            height: 56px;
            margin: 0 auto 12px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.3s;
        }

        .link-card:hover .link-icon-wrapper {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .link-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .link-icon.error {
            width: 28px;
            height: 28px;
            opacity: 0.5;
        }

        .link-title {
            color: white;
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        .delete-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(245, 87, 108, 0.9);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s;
            font-size: 14px;
            line-height: 1;
        }

        .link-card:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: #f5576c;
            transform: scale(1.1);
        }

        /* 右键上下文菜单 */
        .context-menu {
            position: fixed;
            background: white;
            border-radius: 12px;
            padding: 6px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            min-width: 140px;
            display: none;
            animation: menuFadeIn 0.15s ease;
        }

        @keyframes menuFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .context-menu.show {
            display: block;
        }

        .context-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #333;
            transition: background 0.2s;
            user-select: none;
        }

        .context-menu-item:hover {
            background: #f5f5f5;
        }

        .context-menu-item.danger:hover {
            background: #fff0f2;
            color: #f5576c;
        }

        .context-menu-divider {
            height: 1px;
            background: #f0f0f0;
            margin: 4px 0;
        }

        /* 编辑弹窗 / 删除确认弹窗 通用遮罩 */
        .edit-modal-overlay,
        .confirm-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .edit-modal-overlay.active,
        .confirm-modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        /* 删除确认弹窗特有样式 */
        .confirm-modal {
            background: white;
            border-radius: 24px;
            padding: 32px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            transform: scale(0.9);
            transition: transform 0.3s;
            text-align: center;
        }

        .confirm-modal-overlay.active .confirm-modal {
            transform: scale(1);
        }

        .confirm-icon {
            font-size: 2.8rem;
            margin-bottom: 12px;
        }

        .confirm-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .confirm-desc {
            font-size: 0.95rem;
            color: #888;
            margin-bottom: 24px;
        }

        .btn-danger {
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        /* 图标选择器 */
        .icon-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .icon-option {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px 8px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s;
            background: #fafafa;
            user-select: none;
        }

        .icon-option:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .icon-option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102,126,234,0.08), rgba(118,75,162,0.08));
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }

        .icon-option img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            border-radius: 8px;
        }

        .icon-option span {
            font-size: 0.78rem;
            color: #555;
            font-weight: 500;
            text-align: center;
        }

        .icon-option.selected span {
            color: #667eea;
        }

        /* 添加按钮 */
        .add-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            cursor: pointer;
        }

        .add-card:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .add-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 12px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.2);
            font-size: 28px;
            color: white;
            transition: all 0.3s;
        }

        .add-card:hover .add-icon {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        /* 添加链接弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: white;
            border-radius: 24px;
            padding: 32px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 16px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .modal-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        /* 启用/禁用开关样式 */
        .toggle-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            margin-bottom: 8px;
        }

        .toggle-label {
            font-size: 0.95rem;
            color: #555;
            font-weight: 500;
        }

        .toggle-switch {
            position: relative;
            width: 52px;
            height: 28px;
            cursor: pointer;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #e0e0e0;
            border-radius: 28px;
            transition: all 0.3s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: all 0.3s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .toggle-switch input:checked + .toggle-slider {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(24px);
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }

        .btn-secondary:hover {
            background: #ebebeb;
        }

        .loading {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            color: rgba(255,255,255,0.8);
            padding: 60px 20px;
            grid-column: 1 / -1;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.6;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .empty-state p {
            opacity: 0.7;
        }

        /* 背景设置 */
        .bg-settings {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 100;
            width: 280px;
            backdrop-filter: blur(20px);
        }

        .bg-settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .bg-settings-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bg-close-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .bg-close-btn:hover {
            color: #333;
        }

        .bg-input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .bg-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .bg-categories {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .bg-category {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            background: #f0f0f0;
            color: #666;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .bg-category:hover {
            background: #e0e0e0;
        }

        .bg-category.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .bg-presets {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .bg-preset {
            aspect-ratio: 16/10;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
            background-size: cover;
            background-position: center;
        }

        .bg-preset:hover {
            transform: scale(1.05);
            border-color: #667eea;
        }

        .bg-preset.active {
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.3);
        }

        /* 同步设置 */
        .sync-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .sync-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sync-status {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .sync-status.connected {
            color: #10b981;
            background: #ecfdf5;
        }

        .sync-status.error {
            color: #ef4444;
            background: #fef2f2;
        }

        .sync-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .sync-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px 14px;
            border: none;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .sync-btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .sync-btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
        }

        .sync-btn-secondary {
            background: #f0f0f0;
            color: #555;
        }

        .sync-btn-secondary:hover {
            background: #e5e5e5;
        }

        .sync-btn-danger {
            background: #fee2e2;
            color: #dc2626;
        }

        .sync-btn-danger:hover {
            background: #fecaca;
        }

        .token-input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 10px;
            font-family: monospace;
            letter-spacing: 0.5px;
        }

        .token-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .token-help {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .token-help a {
            color: #667eea;
            text-decoration: none;
        }

        .token-help a:hover {
            text-decoration: underline;
        }

        .last-sync {
            font-size: 0.75rem;
            color: #999;
            margin-top: 10px;
            text-align: center;
        }

        .bg-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 50px;

    <script>
        // 数据迁移：给旧数据补 order 字段
        function migrateLinks(arr) {
            return arr.map((link, idx) => ({
                ...link,
                order: typeof link.order === 'number' ? link.order : idx
            }));
        }

        // 存储链接的数组
        let links = migrateLinks(JSON.parse(localStorage.getItem('myLinks')) || []);
        
        // 搜索关键词
        let searchKeyword = '';

        // 页面加载时渲染
        document.addEventListener('DOMContentLoaded', () => {
            renderLinks();
            updateTime();

            // 加载保存的背景
            const savedBg = localStorage.getItem('currentWallpaper');

                applyBackground(savedBg);

            // 搜索框输入事件（实时过滤）
            document.getElementById('searchInput').addEventListener('input', (e) => {

            // 弹窗回车事件
            document.getElementById('siteUrl').addEventListener('keypress', (e) => {

            // 自定义背景URL
            document.getElementById('bgUrl')?.addEventListener('change', (e) => {
                if (e.target.value.trim()) {
                    changeBg(e.target.value.trim());

            });

            // 点击遮罩关闭弹窗
            document.getElementById('addModal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeModal();
            });
            
            // 初始化壁纸选择器
            initWallpaperSelector();
            
            // 初始化同步状态
            initSyncStatus();
        });

        // 壁纸配置
        const wallpaperConfig = {
            '普通': [
                '05de2cb3d4f0c4279c5865573ca090c0.jpg',
                '1024942.jpg',
                '289029-106.jpg',
                '8244baf212e210ce647ec4f2cc1e5faa.jpg',
                'wallhaven-1j7z19.jpg',
                'wallhaven-2813r9.png',
                'wallhaven-3zkow9.jpg',

            ],
            '凡人': [
                '1040g0k031jr87ak3jq205ps66nf2325d71n5eso.png',
                '1040g34o31jush0q33q005ps66nf2325dlu5lqo0.png',
                '1040g34o31jush0q33q105ps66nf2325d0sdmadg.png',
                '1040g34o31jush0q33q205ps66nf2325d5rahf1g.png',
                '65135216e96729e64c8c0e6dad41585226798031.jpg',
                'cf1581e3cce29f071191a7ca8541305b26798031.jpg',
                '宋玉1.jpg',

            ]
        };
        
        let currentCategory = '普通';
        let currentWallpaper = localStorage.getItem('currentWallpaper') || '壁纸/普通/wallhaven-1j7z19.jpg';

        // 初始化壁纸选择器
        function initWallpaperSelector() {
            renderWallpapers();
            // 应用保存的壁纸
            if (currentWallpaper) {
                applyBackground(currentWallpaper);

        // 切换分类
        function switchCategory(category) {
            currentCategory = category;
            // 更新按钮状态
            document.querySelectorAll('.bg-category').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === category);
            });
            renderWallpapers();

        // 渲染壁纸缩略图
        function renderWallpapers() {
            const container = document.getElementById('bgPresets');

            container.innerHTML = wallpapers.map(filename => {

                            style="background-image: url('${path}')" 
                            onclick="selectWallpaper('${path}')" 
                            title="${filename}"></div>`;
            }).join('');
        }

        // 选择壁纸
        function selectWallpaper(path) {
            currentWallpaper = path;
            localStorage.setItem('currentWallpaper', path);
            applyBackground(path);
            renderWallpapers(); // 重新渲染以更新选中状态
        }

        // 更新时间
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('timeDisplay').textContent = `${hours}:${minutes}`;
            
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const dateStr = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 ${days[now.getDay()]}`;
            document.getElementById('dateDisplay').textContent = dateStr;
        }

        // 打开添加弹窗
        function openModal() {
            document.getElementById('addModal').classList.add('active');
            document.getElementById('siteUrl').focus();
        }

        // 关闭添加弹窗
        function closeModal() {
            document.getElementById('addModal').classList.remove('active');
            document.getElementById('siteUrl').value = '';
            document.getElementById('siteName').value = '';
        }

        // 切换背景设置面板
        function toggleBgSettings() {
            document.getElementById('bgSettings').classList.toggle('hidden');
        }

        // 实时更新「自动获取」图标预览 - 已移除，统一使用默认图标

        // 图标类型选择 - 已移除，统一使用默认图标

        // 添加链接
        async function addLink() {
            const urlInput = document.getElementById('siteUrl');
            const nameInput = document.getElementById('siteName');
            
            let url = urlInput.value.trim();
            const customName = nameInput.value.trim();

            if (!url) {
                alert('请输入网址！');
                return;
            }

            // 自动添加协议
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            // 验证URL
            try {
                new URL(url);
            } catch {
                alert('请输入有效的网址！');
                return;
            }

            // 提取域名
            const domain = new URL(url).hostname;
            
            // 使用名称或域名作为显示名称
            const name = customName || domain.replace('www.', '');

            // 统一使用默认图标
            const favicon = 'api.svg';
            // 计算启用组最大 order，新增放到末尾
            const enabledOrders = links.filter(l => l.enabled !== false).map(l => l.order ?? 0);
            const maxOrder = enabledOrders.length > 0 ? Math.max(...enabledOrders) : -1;
            const link = {
                id: Date.now(),
                url: url,
                name: name,
                domain: domain,
                favicon: favicon,
                enabled: true,
                order: maxOrder + 1,
                addedAt: new Date().toISOString()
            };

            links.push(link);
            saveLinks();
            renderLinks();
            closeModal();
        }

        // 获取网站favicon - 已移除，统一使用默认图标 api.svg

        // 根据位置返回徽章 CSS class
        function getBadgeClass(position) {
            if (position <= 3) return 'rank-high';
            if (position <= 10) return 'rank-mid';
            return 'rank-normal';
        }

        // 渲染单个卡片（启用/禁用通用）
        function renderCard(link, position) {
            const iconFallback = "this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E🔗%3C/text%3E%3C/svg%3E'; this.classList.add('error');";

            if (link.enabled === false) {
                return `
                    <div class="link-card disabled" data-id="${link.id}" draggable="true"
                         title="${link.name} (已禁用)"
                         onclick="event.preventDefault(); showContextMenu(event, ${link.id});">
                        <button class="delete-btn" onclick="deleteLink(event, ${link.id})" title="删除">×</button>
                        <div class="link-icon-wrapper">
                            <img src="${link.favicon}" alt="${link.name}" class="link-icon"
                                 onerror="${iconFallback}">
                        </div>
                        <div class="link-title">${link.name}</div>
                    </div>
                `;
            }

            const badgeHtml = position !== null
                ? `<div class="position-badge ${getBadgeClass(position)}">${position}</div>`
                : '';
            return `
                <a href="${link.url}" target="_blank" class="link-card" data-id="${link.id}" draggable="true"
                   title="${link.name}"
                   oncontextmenu="showContextMenu(event, ${link.id})">
                    ${badgeHtml}
                    <button class="delete-btn" onclick="deleteLink(event, ${link.id})" title="删除">×</button>
                    <div class="link-icon-wrapper">
                        <img src="${link.favicon}" alt="${link.name}" class="link-icon"
                             onerror="${iconFallback}">
                    </div>
                    <div class="link-title">${link.name}</div>
                </a>
            `;
        }

        // 渲染链接列表
        function renderLinks() {
            const enabledGrid = document.getElementById('enabledGrid');
            const disabledGrid = document.getElementById('disabledGrid');
            const enabledTitle = document.getElementById('enabledTitle');
            const disabledTitle = document.getElementById('disabledTitle');

            // 过滤（搜索）
            let filtered = links;
            if (searchKeyword) {
                filtered = links.filter(link =>
                    link.name.toLowerCase().includes(searchKeyword) ||
                    link.domain.toLowerCase().includes(searchKeyword)
                );
            }

            // 分组 + 排序
            const byOrder = (a, b) => (a.order ?? 0) - (b.order ?? 0);
            const enabledLinks = filtered.filter(l => l.enabled !== false).sort(byOrder);
            const disabledLinks = filtered.filter(l => l.enabled === false).sort(byOrder);

            // 添加按钮（非搜索状态下显示）
            const addCardHtml = !searchKeyword ? `
                <div class="link-card add-card" onclick="openModal()" title="添加网站">
                    <div class="add-icon">+</div>
                    <div class="link-title">添加</div>
                </div>
            ` : '';

            // 全部为空 + 非搜索 → 第一格为添加卡片，下方一行提示
            if (links.length === 0 && !searchKeyword) {
                enabledTitle.textContent = '常用网站';
                enabledGrid.innerHTML = `
                    <div class="link-card add-card" onclick="openModal()" title="添加网站">
                        <div class="add-icon">+</div>
                        <div class="link-title">添加</div>
                    </div>
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">📭</div>
                        <h3>还没有添加任何网站</h3>
                        <p>点击上方"添加"开始收藏</p>
                    </div>
                `;
                disabledTitle.style.display = 'none';
                disabledGrid.innerHTML = '';
                return;
            }

            // 搜索无结果
            if (searchKeyword && enabledLinks.length === 0 && disabledLinks.length === 0) {
                enabledTitle.textContent = '常用网站';
                enabledGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">🔍</div>
                        <h3>未找到匹配的网站</h3>
                        <p>尝试其他关键词</p>
                    </div>
                `;
                disabledTitle.style.display = 'none';
                disabledGrid.innerHTML = '';
                return;
            }

            // 渲染启用组
            enabledTitle.textContent = `常用网站 (${enabledLinks.length})`;
            const enabledHtml = enabledLinks.map((link, idx) => renderCard(link, idx + 1)).join('');
            enabledGrid.innerHTML = enabledHtml + addCardHtml;

            // 渲染禁用组
            if (disabledLinks.length > 0) {
                disabledTitle.style.display = '';
                disabledTitle.textContent = `已禁用 (${disabledLinks.length})`;
                disabledGrid.innerHTML = disabledLinks.map(link => renderCard(link, null)).join('');
            } else {
                disabledTitle.style.display = 'none';
                disabledGrid.innerHTML = '';
            }

            // 附加拖拽处理器
            attachDragHandlers();
        }

        // ===== 拖拽排序 =====
        let draggedId = null;

        function attachDragHandlers() {
            document.querySelectorAll('.link-card[draggable="true"]').forEach(card => {
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragover', handleDragOver);
                card.addEventListener('dragleave', handleDragLeave);
                card.addEventListener('drop', handleDrop);
                card.addEventListener('dragend', handleDragEnd);
            });
        }

        function handleDragStart(e) {
            draggedId = parseInt(this.dataset.id);
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', String(draggedId));
        }

        function handleDragOver(e) {
            if (draggedId === null) return;
            const targetId = parseInt(this.dataset.id);
            if (targetId === draggedId) return;

            const dragged = links.find(l => l.id === draggedId);
            const target = links.find(l => l.id === targetId);
            if (!dragged || !target) return;
            // 跨组忽略
            if ((dragged.enabled !== false) !== (target.enabled !== false)) return;

            e.preventDefault();
            this.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            this.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            e.stopPropagation();
            this.classList.remove('drag-over');

            if (draggedId === null) return;
            const targetId = parseInt(this.dataset.id);
            if (targetId === draggedId) return;

            const dragged = links.find(l => l.id === draggedId);
            const target = links.find(l => l.id === targetId);
            if (!dragged || !target) return;
            if ((dragged.enabled !== false) !== (target.enabled !== false)) return;

            // 同组内重排 + 紧凑化 order
            const isEnabled = dragged.enabled !== false;
            const group = links.filter(l => (l.enabled !== false) === isEnabled)
                                .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
            const fromIdx = group.findIndex(l => l.id === draggedId);
            const toIdx = group.findIndex(l => l.id === targetId);
            if (fromIdx === -1 || toIdx === -1) return;

            const [removed] = group.splice(fromIdx, 1);
            group.splice(toIdx, 0, removed);

            group.forEach((l, idx) => {
                const item = links.find(link => link.id === l.id);
                if (item) item.order = idx;
            });

            saveLinks();
            renderLinks();
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
            draggedId = null;
        }

        // 删除链接（卡片上的 × 按钮）
        function deleteLink(event, id) {
            event.preventDefault();
            event.stopPropagation();
            editingId = id;
            const overlay = document.getElementById('confirmModal');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
        }

        // 保存链接到localStorage
        function saveLinks() {
            localStorage.setItem('myLinks', JSON.stringify(links));
        }

        // ===== 右键菜单功能 =====
        let contextTargetId = null;

        // 显示右键菜单
        function showContextMenu(event, id) {
            event.preventDefault();
            event.stopPropagation();
            contextTargetId = id;

            const menu = document.getElementById('contextMenu');
            menu.classList.add('show');

            // 防止菜单超出屏幕
            const menuW = 150, menuH = 90;
            let x = event.clientX, y = event.clientY;
            if (x + menuW > window.innerWidth) x = window.innerWidth - menuW - 8;
            if (y + menuH > window.innerHeight) y = window.innerHeight - menuH - 8;

            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
        }

        // 隐藏右键菜单
        function hideContextMenu() {
            document.getElementById('contextMenu').classList.remove('show');
            contextTargetId = null;
        }

        // 点击其他区域关闭菜单
        document.addEventListener('click', hideContextMenu);
        document.addEventListener('contextmenu', (e) => {
            if (!e.target.closest('.link-card') || e.target.closest('.add-card')) {
                hideContextMenu();
            }
        });

        // 从右键菜单删除 - 改为弹出自定义确认框
        function deleteLinkFromMenu() {
            if (contextTargetId === null) return;
            editingId = contextTargetId;
            document.getElementById('contextMenu').classList.remove('show');
            contextTargetId = null;
            // 打开自定义删除确认弹窗
            const overlay = document.getElementById('confirmModal');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
        }

        // 关闭删除确认弹窗
        function closeConfirmModal() {
            const overlay = document.getElementById('confirmModal');
            overlay.classList.remove('active');
            setTimeout(() => overlay.style.display = 'none', 300);
            editingId = null;
        }

        // 确认删除
        function confirmDelete() {
            if (editingId === null) return;
            links = links.filter(link => link.id !== editingId);
            saveLinks();
            renderLinks();
            closeConfirmModal();
        }

        // 正在编辑的链接 id（独立于右键菜单，不会被 hideContextMenu 清除）
        let editingId = null;

        // 打开编辑弹窗
        function openEditModal() {
            if (contextTargetId === null) return;
            editingId = contextTargetId;
            const link = links.find(l => l.id === editingId);
            if (!link) return;

            document.getElementById('editSiteUrl').value = link.url;
            document.getElementById('editSiteName').value = link.name;
            // 设置启用状态（默认为 true，兼容旧数据）
            document.getElementById('editSiteEnabled').checked = link.enabled !== false;

            // 先关菜单，再开弹窗
            document.getElementById('contextMenu').classList.remove('show');
            contextTargetId = null;

            const overlay = document.getElementById('editModal');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
            document.getElementById('editSiteName').focus();
        }

        // 关闭编辑弹窗
        function closeEditModal() {
            const overlay = document.getElementById('editModal');
            overlay.classList.remove('active');
            setTimeout(() => overlay.style.display = 'none', 300);
            editingId = null;
        }

        // 保存编辑
        async function saveEdit() {
            if (editingId === null) return;
            const idx = links.findIndex(l => l.id === editingId);
            if (idx === -1) return;

            let url = document.getElementById('editSiteUrl').value.trim();
            const name = document.getElementById('editSiteName').value.trim();
            const enabled = document.getElementById('editSiteEnabled').checked;

            if (!url) { alert('请输入网址！'); return; }
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            try { new URL(url); } catch { alert('请输入有效的网址！'); return; }

            const domain = new URL(url).hostname;

            const wasEnabled = links[idx].enabled !== false;

            links[idx].url = url;
            links[idx].name = name || domain.replace('www.', '');
            links[idx].domain = domain;
            links[idx].favicon = 'api.svg'; // 统一使用默认图标
            links[idx].enabled = enabled;

            // 启用状态切换时，把它放到目标组末尾
            if (wasEnabled !== enabled) {
                const targetOrders = links
                    .filter((l, i) => i !== idx && (l.enabled !== false) === enabled)
                    .map(l => l.order ?? 0);
                const maxOrder = targetOrders.length > 0 ? Math.max(...targetOrders) : -1;
                links[idx].order = maxOrder + 1;
            }

            saveLinks();
            renderLinks();
            closeEditModal();
        }

        // 编辑弹窗回车保存
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('editSiteUrl')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') saveEdit();
            });
            document.getElementById('editSiteName')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') saveEdit();
            });
            // 编辑弹窗和删除确认弹窗均不响应点击遮罩关闭（防止选文字时误触）
        });

        // 更换背景
        function changeBg(bg) {
            currentWallpaper = bg;
            localStorage.setItem('currentWallpaper', bg);
            applyBackground(bg);
        }

        // ===== GitHub Gist 同步功能 =====
        const GIST_FILENAME = 'infinity-start-data.json';

        // 页面加载时检查同步状态
        function initSyncStatus() {
            const token = localStorage.getItem('githubToken');
            const gistId = localStorage.getItem('gistId');
            if (token && gistId) {
                showSyncConnected();
            }
        }

        // 连接 GitHub
        async function connectGitHub() {
            const token = document.getElementById('githubToken').value.trim();
            if (!token) {
                alert('请输入 GitHub Token');
                return;
            }

            const statusEl = document.getElementById('syncStatus');
            statusEl.textContent = '正在连接...';
            statusEl.className = 'sync-status';

            try {
                // 验证 Token 并查找或创建 Gist
                const gistId = await findOrCreateGist(token);
                localStorage.setItem('githubToken', token);
                localStorage.setItem('gistId', gistId);
                showSyncConnected();
                statusEl.textContent = '已连接 - 可以上传/下载数据';
                statusEl.className = 'sync-status connected';
            } catch (error) {
                statusEl.textContent = '连接失败: ' + error.message;
                statusEl.className = 'sync-status error';
            }
        }

        // 查找或创建 Gist
        async function findOrCreateGist(token) {
            // 先查找是否已有 Gist
            const response = await fetch('https://api.github.com/gists', {
                headers: { 'Authorization': 'token ' + token }
            });
            if (!response.ok) throw new Error('Token 无效');

            const gists = await response.json();
            const existingGist = gists.find(g => g.files && g.files[GIST_FILENAME]);

            if (existingGist) {
                return existingGist.id;
            }

            // 创建新 Gist
            const createResponse = await fetch('https://api.github.com/gists', {
                method: 'POST',
                headers: {
                    'Authorization': 'token ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    description: 'Infinity Start 数据同步',
                    public: false,
                    files: {
                        [GIST_FILENAME]: {
                            content: JSON.stringify({ links: [], wallpaper: '' })
                        }
                    }
                })
            });

            if (!createResponse.ok) throw new Error('创建 Gist 失败');
            const newGist = await createResponse.json();
            return newGist.id;
        }

        // 显示已连接状态
        function showSyncConnected() {
            document.getElementById('syncLoginForm').style.display = 'none';
            document.getElementById('syncActions').style.display = 'block';
            const lastSync = localStorage.getItem('lastSync');
            if (lastSync) {
                document.getElementById('lastSync').textContent = '上次同步: ' + new Date(lastSync).toLocaleString();
            }
        }

        // 断开连接
        function disconnectGitHub() {
            if (!confirm('确定要断开连接吗？本地数据不会丢失。')) return;
            localStorage.removeItem('githubToken');
            localStorage.removeItem('gistId');
            localStorage.removeItem('lastSync');
            document.getElementById('syncLoginForm').style.display = 'block';
            document.getElementById('syncActions').style.display = 'none';
            document.getElementById('syncStatus').textContent = '未连接 - 数据仅保存在当前浏览器';
            document.getElementById('syncStatus').className = 'sync-status';
            document.getElementById('githubToken').value = '';
        }

        // 上传到 Gist
        async function uploadToGist() {
            const token = localStorage.getItem('githubToken');
            const gistId = localStorage.getItem('gistId');
            if (!token || !gistId) return;

            const statusEl = document.getElementById('syncStatus');
            statusEl.textContent = '正在上传...';

            try {
                const data = {
                    links: links,
                    wallpaper: localStorage.getItem('currentWallpaper') || ''
                };

                const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': 'token ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: {
                            [GIST_FILENAME]: {
                                content: JSON.stringify(data, null, 2)
                            }
                        }
                    })
                });

                if (!response.ok) throw new Error('上传失败');

                const now = new Date().toISOString();
                localStorage.setItem('lastSync', now);
                document.getElementById('lastSync').textContent = '上次同步: ' + new Date(now).toLocaleString();
                statusEl.textContent = '已连接 - 上传成功';
                statusEl.className = 'sync-status connected';
            } catch (error) {
                statusEl.textContent = '上传失败: ' + error.message;
                statusEl.className = 'sync-status error';
            }
        }

        // 从 Gist 下载
        async function downloadFromGist() {
            const token = localStorage.getItem('githubToken');
            const gistId = localStorage.getItem('gistId');
            if (!token || !gistId) return;

            const statusEl = document.getElementById('syncStatus');
            statusEl.textContent = '正在下载...';

            try {
                const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                    headers: { 'Authorization': 'token ' + token }
                });

                if (!response.ok) throw new Error('下载失败');

                const gist = await response.json();
                const file = gist.files[GIST_FILENAME];
                if (!file) throw new Error('数据文件不存在');

                const data = JSON.parse(file.content);

                // 合并数据（询问是否覆盖）
                if (links.length > 0) {
                    if (!confirm('下载将覆盖当前本地数据，确定继续？')) return;
                }

                // 恢复数据
                if (data.links) {
                    links = migrateLinks(data.links);
                    saveLinks();
                    renderLinks();
                }
                if (data.wallpaper) {
                    localStorage.setItem('currentWallpaper', data.wallpaper);
                    applyBackground(data.wallpaper);
                }

                const now = new Date().toISOString();
                localStorage.setItem('lastSync', now);
                document.getElementById('lastSync').textContent = '上次同步: ' + new Date(now).toLocaleString();
                statusEl.textContent = '已连接 - 下载成功';
                statusEl.className = 'sync-status connected';
            } catch (error) {
                statusEl.textContent = '下载失败: ' + error.message;
                statusEl.className = 'sync-status error';
            }
        }

        // 应用背景
        function applyBackground(bg) {
            const body = document.body;
            
            if (bg.startsWith('gradient')) {
                body.style.backgroundImage = 'none';
                switch(bg) {
                    case 'gradient1':
                        body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                        break;
                    case 'gradient2':
                        body.style.background = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
                        break;
                }
            } else {
                body.style.background = `url('${bg}') center/cover no-repeat fixed`;
            }
        }
    </script>
</body>
</html>
